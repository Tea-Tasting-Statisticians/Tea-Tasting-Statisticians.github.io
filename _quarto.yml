    theme:
      light:
        - flatly
        - mozilla.scss
    css: styles.css
    toc: false
    include-in-header:
      - text: |
          <script data-goatcounter="https://tea-tasting-statisticians.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
          <meta name="google-site-verification" content="CDmwxkfajMdAyUWqJaIldv9oPmm7Xi2gwd8CHdzkUgc">
          <meta name="naver-site-verification" content="1729d54e76c11c92a3081fec21aa19705d8692e0" />
    include-after-body:
      - text: |
          <script>
            document.addEventListener("DOMContentLoaded", function () {
              var isPostPage = /^\/posts\/[^/]+\/?$/.test(window.location.pathname);

              var authorProfiles = {
                "Tea Tasting Gentleman": "https://www.linkedin.com/in/shstat1729/",
                "Tea Tasting Lady": "https://www.linkedin.com/in/systat/"
              };

              function createAuthorLink(name) {
                var url = authorProfiles[name];

                if (!url) return null;

                var link = document.createElement("a");
                link.href = url;
                link.textContent = name;
                link.className = "author-profile-link";
                link.style.color = "inherit";
                link.style.textDecoration = "underline";
                link.style.textUnderlineOffset = "0.15em";

                return link;
              }

              function linkTitleBlockAuthors() {
                document.querySelectorAll("#title-block-header .quarto-title-meta-contents p").forEach(function (authorNode) {
                  var name = authorNode.textContent.trim();
                  var link = createAuthorLink(name);

                  if (!link || authorNode.querySelector("a")) return;

                  authorNode.textContent = "";
                  authorNode.appendChild(link);
                });
              }

              function linkListingAuthors() {
                document.querySelectorAll(".metadata .listing-author").forEach(function (authorNode) {
                  var name = authorNode.textContent.trim();
                  var link = createAuthorLink(name);

                  if (!link) return;

                  link.classList.add("listing-author");
                  link.style.display = "block";

                  var metadata = authorNode.closest(".metadata");
                  var postLink = authorNode.closest("a");

                  if (metadata && postLink && postLink.parentElement === metadata) {
                    postLink.removeChild(authorNode);
                    metadata.appendChild(link);
                    return;
                  }

                  authorNode.replaceWith(link);
                });
              }

              function addLinkedInShareButton() {
                var shareUrl = encodeURIComponent(window.location.href);
                var shareText = encodeURIComponent(document.title + " | Tea Tasting Statisticians");
                var button = document.createElement("a");
                button.href = "https://www.linkedin.com/sharing/share-offsite/?url=" + shareUrl + "&summary=" + shareText;
                button.className = "linkedin-share-fab";
                button.target = "_blank";
                button.rel = "noopener";
                button.textContent = "Share on LinkedIn";
                document.body.appendChild(button);
              }

              function whenGoatCounterReady(callback) {
                var attempts = 0;
                var timer = window.setInterval(function () {
                  attempts += 1;

                  if (window.goatcounter && typeof window.goatcounter.get_data === "function") {
                    window.clearInterval(timer);
                    callback(window.goatcounter);
                    return;
                  }

                  if (attempts >= 50) {
                    window.clearInterval(timer);
                    callback(null);
                  }
                }, 100);
              }

              function addPostViewCount() {
                var titleMeta = document.querySelector("#title-block-header .quarto-title-meta");
                var goatCounterScript = document.querySelector("script[data-goatcounter]");

                if (!titleMeta || !goatCounterScript || document.querySelector(".post-views-meta")) return;

                var viewsMeta = document.createElement("div");
                viewsMeta.className = "post-views-meta";
                viewsMeta.innerHTML =
                  '<div class="quarto-title-meta-heading">Views</div>' +
                  '<div class="quarto-title-meta-contents"><p class="post-view-count is-loading">Loading...</p></div>';
                titleMeta.appendChild(viewsMeta);

                var countElement = viewsMeta.querySelector(".post-view-count");
                var goatCounterBase = goatCounterScript
                  .getAttribute("data-goatcounter")
                  .replace(/\/count\/?$/, "");

                whenGoatCounterReady(function (goatcounter) {
                  if (!goatcounter) {
                    viewsMeta.remove();
                    return;
                  }

                  var data = goatcounter.get_data();
                  var path = data && data.p ? data.p : window.location.pathname;

                  window.setTimeout(function () {
                    window.fetch(goatCounterBase + "/counter/" + encodeURIComponent(path) + ".json", {
                      cache: "no-store"
                    })
                      .then(function (response) {
                        if (response.status === 404) return { count: "0" };
                        if (!response.ok) throw new Error("Unable to load GoatCounter views");
                        return response.json();
                      })
                      .then(function (payload) {
                        if (!payload || typeof payload.count === "undefined") {
                          throw new Error("Invalid GoatCounter response");
                        }

                        countElement.textContent = payload.count;
                        countElement.classList.remove("is-loading");
                      })
                      .catch(function () {
                        viewsMeta.remove();
                      });
                  }, 1000);
                });
              }

              linkTitleBlockAuthors();
              linkListingAuthors();
              if (!isPostPage) return;
              addLinkedInShareButton();
              addPostViewCount();
            });
          </script>

execute:
  freeze: auto
